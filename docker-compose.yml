services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-soudobem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soudobem}
      POSTGRES_DB: ${POSTGRES_DB:-soudobem}
    volumes:
      - soudobem_pg_data:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./server/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soudobem} -d ${POSTGRES_DB:-soudobem}"]
      interval: 5s
      timeout: 5s
      retries: 15
    # Sem publish de host: evita conflito de porta no Forja/outros stacks
    # Para dev local com DB externo, use docker-compose.override.yml

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Dentro da rede Docker o host do banco é o service name
      DATABASE_URL: postgresql://${POSTGRES_USER:-soudobem}:${POSTGRES_PASSWORD:-soudobem}@postgres:5432/${POSTGRES_DB:-soudobem}
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:-dev-soudobem-secret-change-me}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:8080}
      OPENROUTER_SITE_NAME: ${OPENROUTER_SITE_NAME:-Sou do Bem Local}
    depends_on:
      postgres:
        condition: service_healthy
    # API só na rede interna; o nginx (web) faz proxy /api
    expose:
      - "3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      # Forja roteia o domínio para esta porta
      - "8080:80"

volumes:
  soudobem_pg_data:
